name: Bug report
description: Something is not working as documented.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Security issues: do not file here. See SECURITY.md."
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options: ["Web (browser)", "iOS TestFlight", "Android APK"]
    validations:
      required: true
  - type: textarea
    id: sr
    attributes:
      label: Screen reader in use (if any)
